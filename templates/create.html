{% extends "temp.html" %}

{% block title %}Create Account Email{% endblock %}

{% block body %}

<main>
    <div class="sign-up-container">
        <div class="sign-up-item-container">
            <div class="header-container">
                <div class="header">
                    <h1>Create Account</h1>
                </div>
                <div class="step"><h2 id="stepHeader">Step 1</h2></div>
            </div>
            <div class="create-input-container">
                <form id="nextInput" class="create-input-box" action="/create" method="POST">
                    <input id="emailInput" autocomplete="off" autofocus type="email" name="email" placeholder="firstname@Company.com">
                    <p id="emailTypeError"></p>
                    
                    
                    <input id="emailConfirmInput" autocomplete="off" autofocus type="email" name="email" placeholder=" Confirm email">
                    <p id="emailConfirmTypeError"></p>

                    <input id="passwordInput" autocomplete="off" type="password" name="password" placeholder="Password">
                    <p id="passwordTypeError"></p>
                    <button class="next-button" id="inputBtn" type="submit"></button>  
                </form>
            </div>
            <div class="option-choice-container">
                <div class="option-choice">
                    <a href="/"><div class="option-button">Login</div></a>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="{{url_for('static', filename='css/stepOne.js')}}"></script>

{% endblock %}
